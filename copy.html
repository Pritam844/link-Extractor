<!DOCTYPE html>

<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Copy Manager</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
padding:15px;
}

.stats{
margin:10px;
font-size:18px;
}

button{
padding:8px 15px;
border:none;
border-radius:6px;
background:#00ff88;
cursor:pointer;
font-weight:bold;
}

.copyNext{
background:#ff9800;
margin:10px;
}

.section{
margin-top:25px;
}

.box{
background:#1e1e1e;
margin:8px;
padding:12px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:14px;
word-break:break-all;
}

.copied{
background:#163a28;
}

</style>

</head>

<body>

<h2>📋 Link Copy Manager</h2>

<a href="index.html">
<button>⬅ Back</button>
</a>

<div class="stats">
Remaining: <span id="remaining">0</span> |
Copied: <span id="done">0</span>
</div>

<button class="copyNext" onclick="copyNext()">⚡ Copy Next</button>

<div class="section">
<h3>🔗 Not Copied</h3>
<div id="notCopied"></div>
</div>

<div class="section">
<h3>✅ Copied</h3>
<div id="copied"></div>
</div>

<script>

let links = JSON.parse(localStorage.getItem("links")) || []
let copiedLinks = JSON.parse(localStorage.getItem("copiedLinks")) || []

let notCopiedDiv=document.getElementById("notCopied")
let copiedDiv=document.getElementById("copied")

let remaining=document.getElementById("remaining")
let done=document.getElementById("done")

function render(){

notCopiedDiv.innerHTML=""
copiedDiv.innerHTML=""

remaining.innerText=links.length
done.innerText=copiedLinks.length

links.forEach((link,i)=>{

let div=document.createElement("div")

div.className="box"

div.innerHTML=`
<span>${link}</span>
<button onclick="copyLink(${i})">Copy</button>
`

notCopiedDiv.appendChild(div)

})

copiedLinks.forEach(link=>{

let div=document.createElement("div")

div.className="box copied"

div.innerHTML=`
<span>${link}</span>
<button disabled>Copied</button>
`

copiedDiv.appendChild(div)

})

}

function copyLink(i){

let link=links[i]

navigator.clipboard.writeText(link)

links.splice(i,1)

copiedLinks.push(link)

save()

}

function copyNext(){

if(links.length==0){
alert("All links copied!")
return
}

let link=links[0]

navigator.clipboard.writeText(link)

links.shift()

copiedLinks.push(link)

save()

}
