<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Extractor</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:20px;
}

textarea{
width:90%;
height:200px;
padding:10px;
border-radius:8px;
border:none;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:6px;
background:#00ff88;
cursor:pointer;
}

.link{
background:#222;
padding:10px;
margin:5px;
border-radius:6px;
}
</style>
</head>

<body>

<h2>🔗 Link Extractor</h2>

<textarea id="input" placeholder="Paste your text here"></textarea><br>

<button onclick="extract()">Extract Links</button>

<br><br>

<a href="copy.html">
<button>Go To Copy Page</button>
</a>

<div id="result"></div>

<script>

function extract(){

let text=document.getElementById("input").value

let regex=/(https?:\/\/[^\s]+)/g

let links=text.match(regex)

let result=document.getElementById("result")

result.innerHTML=""

if(!links){
result.innerHTML="No Links Found"
return
}

localStorage.setItem("links",JSON.stringify(links))

links.forEach(link=>{
result.innerHTML+=`<div class="link">${link}</div>`
})

}

</script>

</body>
</html>
